name: CI

on:
  workflow_dispatch:
  # Uncomment below once your design system builds successfully:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm --filter @vcds/tokens build

      - name: Build CSS
        run: pnpm --filter @vcds/css build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build all packages
        run: pnpm build

      - name: Accessibility checks
        run: pnpm -r test:a11y
